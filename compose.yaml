version: "3.8"

services:
    backend:
        build: ./backend
        volumes:
            - laravel_code:/var/www
        depends_on:
            - db

    nginx:
        image: nginx:latest
        ports:
            - "8000:80"
        volumes:
            - laravel_code:/var/www
            - ./backend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:Z
        depends_on:
            - backend

    frontend:
        build: ./frontend
        ports:
            - "3000:3000"

    db:
        image: postgres:16
        ports:
            - "5433:5432"
        environment:
            POSTGRES_DB: mango
            POSTGRES_USER: mango
            POSTGRES_PASSWORD: mango
        volumes:
            - postgres_data:/var/lib/postgresql/data:Z

volumes:
    postgres_data:
    laravel_code:
